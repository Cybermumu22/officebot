<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1220">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>officebot — Claude Code Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b14; --surface:#0f1220; --accent:#e63946; --accent2:#7c3aed;
    --green:#10b981; --yellow:#f59e0b; --cyan:#06b6d4; --border:#232742;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:radial-gradient(ellipse at top, #131a2e 0%, var(--bg) 60%);
    color:#e2e4f0; font-family:'VT323', monospace; font-size:18px;
    min-height:100vh; display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
    padding:14px 22px; border-bottom:1px solid var(--border);
    background:rgba(15,18,32,.8); backdrop-filter:blur(4px);
    position:sticky; top:0; z-index:5;
  }
  header h1{
    font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900;
    letter-spacing:2px; color:#fff;
    text-shadow:0 0 8px var(--accent2), 0 0 16px rgba(124,58,237,.5);
  }
  header h1 span{color:var(--cyan);}
  .hdr-right{display:flex; align-items:center; gap:18px; font-size:16px; color:#9096b5;}
  .conn-dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; background:var(--accent); box-shadow:0 0 6px var(--accent);}
  .conn-dot.on{background:var(--green); box-shadow:0 0 8px var(--green);}
  main{flex:1; padding:26px; display:flex; flex-direction:column; gap:22px;}
  .cur{color:var(--cyan); animation:tokenCursorBlink 1s step-end infinite;}
  @keyframes tokenCursorBlink{0%,49%{opacity:1;} 50%,100%{opacity:0;}}
  /* Shown instead of a blank box when no session is connected yet — the
     office/rooms are always visible, just dimmed and empty of people. */
  .office-placeholder{opacity:.6;}
  .office-placeholder .office-plaque{color:#8890b8;}

  /* ============ OFFICE FLOOR ============ */
  #floor{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(480px,1fr)); gap:28px;
    align-items:start;
  }
  .office{
    max-width:640px; width:100%; margin:0 auto;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px; box-shadow:0 6px 22px rgba(0,0,0,.4);
    animation:officeIn .45s ease;
  }
  @keyframes officeIn{from{opacity:0; transform:translateY(10px) scale(.97);} to{opacity:1; transform:none;}}

  .office-head{display:flex; align-items:baseline; gap:10px; margin-bottom:10px; padding:0 2px;}
  .office-plaque{font-family:'Orbitron',sans-serif; font-size:.72rem; font-weight:700; color:#fff; letter-spacing:.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .office-cwd{font-family:'VT323',monospace; font-size:1rem; color:#7c8ab0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;}

  .office-floor{
    position:relative; height:400px; border-radius:8px;
    border:1px solid rgba(255,255,255,.05);
    overflow:hidden; touch-action:none; /* this element owns pan/zoom gestures, see initFloorCamera() */
    cursor:grab;
  }
  .office-floor.panning{cursor:grabbing;}
  /* Office flooring: carpet-tile checkerboard + grout lines over an ambient
     vignette, instead of the old bare neon grid — reads as a real floor. */
  .floor-camera{
    position:absolute; inset:0; transform-origin:0 0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 29px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 29px),
      conic-gradient(rgba(139,150,220,.03) 25%, transparent 25% 50%, rgba(139,150,220,.03) 50% 75%, transparent 75%) 0 0/58px 58px,
      radial-gradient(ellipse at 50% 40%, #10142c, #05070f 88%);
  }
  /* Back wall along the top edge: panel seams, a baseboard, and wall props
     (windows with a synthwave night view, clock, poster, the EXIT door). */
  .office-wall{
    position:absolute; left:0; top:0; width:100%; height:13%;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 46px),
      linear-gradient(#1a1f3d, #121631);
    border-bottom:3px solid #262e55;
    box-shadow:0 4px 10px rgba(0,0,0,.55);
  }
  /* Room areas: each zone stands on its own flooring — carpet weaves for
     Planning/Research, raised server-room tiles for Terminal, shelf-room
     stripes for Archives, wood planks for the Lounge, a doormat at the Exit.
     Textures are inline per-mat (ROOM_MATS); this rule is the shared chrome. */
  .room-mat{
    position:absolute; transform:translate(-50%,-50%);
    border-radius:10px; border:1px solid rgba(255,255,255,.055);
    box-shadow:inset 0 0 26px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35);
    transition:border-color .35s, box-shadow .35s;
  }
  .room-mat.mat-active{
    border-color:var(--zc,#7c3aed);
    box-shadow:inset 0 0 38px -10px var(--zc,#7c3aed), 0 2px 8px rgba(0,0,0,.35);
  }
  .tokens-layer{position:absolute; inset:0;}
  .floor-reset{
    position:absolute; top:8px; right:8px; z-index:5; width:26px; height:26px; border-radius:7px;
    background:rgba(10,12,24,.75); border:1px solid rgba(255,255,255,.15); color:#9096b5;
    font-size:14px; line-height:1; cursor:pointer; backdrop-filter:blur(2px);
  }
  .floor-reset:hover{color:#fff; border-color:rgba(255,255,255,.35);}

  /* Zones are now compact SIGN PLATES sitting on the top edge of their
     room mat (the mat is the room; the plate just names it) — like a little
     mounted room sign. Occupants still gather at the zone's x/y anchor,
     which is the mat's centre. */
  .zone{
    position:absolute; transform:translate(-50%,-50%);
    display:flex; align-items:center; gap:5px; padding:3px 9px;
    border-radius:999px; background:rgba(7,9,20,.82);
    border:1px solid rgba(255,255,255,.13);
    box-shadow:0 2px 6px rgba(0,0,0,.5);
    white-space:nowrap;
    transition:border-color .35s, box-shadow .35s;
  }
  .zone.zone-active{border-color:var(--zc,#7c3aed); box-shadow:0 0 16px -3px var(--zc,#7c3aed), 0 2px 6px rgba(0,0,0,.5);}
  /* Decorative furniture — colourful pixel art in the same style as the
     avatar roster (crispEdges rects, top-lit shading), with a drop shadow
     for a bit of depth. Still purely cosmetic: non-interactive, behind the
     people, slightly translucent so the avatars stay the brightest thing. */
  .prop{position:absolute; transform:translate(-50%,-50%); opacity:.8; pointer-events:none; z-index:0; filter:drop-shadow(0 3px 2px rgba(0,0,0,.55));}
  .prop svg{display:block; width:100%; height:auto;}
  /* FLAT props (the rug): no drop-shadow — a shadow under a flat rug made it
     read as a floating slab rather than fabric on the floor. */
  .prop-flat{filter:none; opacity:.75;}
  .zone-icon{width:11px; height:11px; color:#7c8ab0; opacity:.85; transition:color .35s, opacity .35s; flex-shrink:0;}
  .zone.zone-active .zone-icon{color:var(--zc,#7c3aed); opacity:1;}
  .zone-icon svg{width:100%; height:100%; display:block;}
  .zone-label{font-family:'Orbitron',sans-serif; font-size:.38rem; letter-spacing:.7px; color:#8a92b8; text-transform:uppercase;}

  /* ---- avatar tokens (persistent DOM nodes so left/top can transition) ----
     .agent-token is positioned+centered exactly on the zone point; .token-badge
     is its only sized box, so it IS the anchor. Bubble/legs/shadow/name are
     absolutely positioned off the badge instead of stacking in normal flow —
     otherwise their combined height drags the visible avatar well above its
     zone (confirmed: badge rendered ~60px above the intended zone box). */
  .agent-token{
    position:absolute; transform:translate(-50%,-50%);
    transition:left 1.7s cubic-bezier(.4,0,.2,1), top 1.7s cubic-bezier(.4,0,.2,1);
    z-index:2;
  }
  .agent-token.token-main{z-index:3;}

  /* Slightly smaller than they used to be (24/32) — traded for roomier
     speech bubbles that can show a full thought. */
  .token-badge{position:relative; width:21px; height:21px;}
  .token-main .token-badge{width:28px; height:28px;}

  .token-bubble{
    position:absolute; left:50%; bottom:100%; transform:translateX(-50%);
    /* Same-zone occupants alternate a "tier" (see render()) so neighboring
       bubbles stack at two different heights instead of fighting for the
       same strip of space right above the badges — a bubble is much wider
       than the horizontal gap between avatar slots, so avatar spacing alone
       (however evenly spread) was never going to stop bubble text from
       overlapping. Bubbles show the FULL speech now (up to a 6-line clamp,
       beyond which the DIALOGUE panel has the rest), so heights vary too
       much for tiers alone to guarantee separation — the tier is just a
       head start; the real guarantee is resolveBubbleLayout(), which
       measures every visible bubble's actual box after each render and
       adds --lift to any that would overlap a neighbour. */
    margin-bottom:calc(9px + var(--tier, 0) * 30px + var(--lift, 0px));
    /* width:max-content is load-bearing: an abs-positioned box otherwise
       shrink-to-fits against its containing block — the 24px badge — and
       collapses to one character per line. max-width still caps it. */
    width:max-content; max-width:150px; padding:4px 7px; border-radius:8px;
    background:#11142a; border:1px solid var(--st); color:#e2e4f0;
    font-family:'VT323',monospace; font-size:.78rem; line-height:1.25; text-align:center;
    opacity:0; white-space:normal; word-break:break-word;
    transition:opacity .25s; z-index:calc(4 + var(--tier, 0));
  }
  /* The clamp lives on an inner span, NOT the bubble itself — the bubble's
     tail arrow is a ::after hanging OUTSIDE the box (top:100%), so
     overflow:hidden on the bubble would clip the arrow right off. */
  .token-bubble .tb-text{display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:6; overflow:hidden;}
  .token-bubble.show{opacity:1;}
  .token-bubble.pulse{animation:bubblePop .25s ease;}
  @keyframes bubblePop{0%{transform:translateX(-50%) scale(.86);} 100%{transform:translateX(-50%) scale(1);}}
  .token-bubble::after{
    content:''; position:absolute; left:50%; top:100%; transform:translateX(-50%);
    border:5px solid transparent; border-top-color:var(--st);
  }
  /* Flipped bubble: when an avatar stands near the top of the floor, a
     bubble anchored above its head pokes past the floor's top edge and
     overflow:hidden cuts its first lines off. resolveBubbleLayout() detects
     that and adds .below — the bubble hangs UNDER the avatar instead (the
     26px base margin clears the legs/shadow/nameplate), with the tail
     arrow flipped to point up at the speaker. */
  .token-bubble.below{
    bottom:auto; top:100%;
    margin-bottom:0;
    margin-top:calc(26px + var(--tier, 0) * 30px + var(--lift, 0px));
  }
  .token-bubble.below::after{
    top:auto; bottom:100%;
    border-top-color:transparent; border-bottom-color:var(--st);
  }

  /* Plain sprite, no frame — just the character art with a soft colored glow
     (a drop-shadow, which hugs the art's own silhouette) standing in for the
     status ring a bordered badge used to give. No border, no circle crop,
     no background box, no glass overlay. */
  .token-badge-face{
    position:absolute; inset:0;
    animation:tokenBob 2.6s ease-in-out infinite;
    transition:filter .4s;
  }
  .token-badge-face svg{width:100%; height:100%;}
  /* Idle = the sprite's ORIGINAL colours, no glow — glow is a "working"
     signal only (user request; the old dim+desaturate+glow read as a
     permanent effect rather than a status). */
  [data-status="idle"] .token-badge-face{filter:none; animation-duration:4.2s;}
  [data-status="thinking"] .token-badge-face, [data-status="calm"] .token-badge-face{filter:brightness(.95) drop-shadow(0 0 8px var(--st)); animation-duration:2.3s;}
  [data-status="active"] .token-badge-face{filter:brightness(1.18) saturate(1.2) drop-shadow(0 0 12px var(--st)); animation-duration:.5s;}
  [data-status="error"] .token-badge-face{filter:brightness(1) hue-rotate(-6deg) drop-shadow(0 0 10px var(--st)); animation:tokenGlitch .3s steps(2) 3;}
  [data-status="done"] .token-badge-face{filter:brightness(1.05) drop-shadow(0 0 10px var(--st));}
  [data-status="offline"] .token-badge-face{filter:grayscale(1) brightness(.35); animation:none;}
  [data-status="courier"] .token-badge-face{filter:brightness(1.1) drop-shadow(0 0 9px var(--st)); animation-duration:1.2s;}
  @keyframes tokenBob{0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-3px) rotate(0);}}
  @keyframes tokenGlitch{
    0%{transform:translate(0,0);} 25%{transform:translate(-2px,1px);}
    50%{transform:translate(2px,-1px);} 75%{transform:translate(-1px,0);} 100%{transform:translate(0,0);}
  }

  /* Walking cue: while in transit the badge gets a snappier bob+waddle and two
     little feet alternate underneath — no per-limb rig on the art itself,
     just enough motion to read as "walking" rather than sliding. */
  .is-walking .token-badge-face{animation:tokenWalk .34s ease-in-out infinite !important;}
  @keyframes tokenWalk{
    0%,100%{transform:translateY(0) rotate(-4deg);}
    50%{transform:translateY(-4px) rotate(4deg);}
  }
  .token-legs{position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:-3px; display:flex; gap:4px; z-index:0;}
  .leg{width:4px; height:6px; border-radius:2px; background:var(--st); opacity:.8;}
  .is-walking .leg-l{animation:legStepL .34s ease-in-out infinite;}
  .is-walking .leg-r{animation:legStepR .34s ease-in-out infinite;}
  @keyframes legStepL{0%,100%{transform:translateY(-2px) scaleY(.75);} 50%{transform:translateY(0) scaleY(1);}}
  @keyframes legStepR{0%,100%{transform:translateY(0) scaleY(1);} 50%{transform:translateY(-2px) scaleY(.75);}}

  /* Hands — same treatment as the legs. They live INSIDE .token-badge-face
     so they inherit the bob/walk/glitch/brightness of the body for free;
     while walking they pump on the legs' keyframes, cross-phased (left hand
     forward with right leg, like an actual gait). */
  .hand{position:absolute; top:52%; width:4px; height:6px; border-radius:2px; background:var(--st); opacity:.8; z-index:2;}
  .hand-l{left:-5px;} .hand-r{right:-5px;}
  .is-walking .hand-l{animation:legStepR .34s ease-in-out infinite;}
  .is-walking .hand-r{animation:legStepL .34s ease-in-out infinite;}

  .token-led{position:absolute; top:-2px; right:-2px; width:7px; height:7px; border-radius:50%; background:var(--st); box-shadow:0 0 5px var(--st); animation:tokenLedBlink 1.6s ease-in-out infinite; z-index:3;}
  [data-status="active"] .token-led{animation-duration:.6s;}
  [data-status="offline"] .token-led{animation:none; opacity:.15;}
  @keyframes tokenLedBlink{0%,100%{opacity:1;} 50%{opacity:.3;}}

  /* "Usual crew" standby tokens (see REGULAR_CREW) — full original colours
     like everyone else at rest (the old .55 fade is gone with the
     idle-means-original-tone change); only the missing LED marks them as
     off-the-clock. */
  .token-crew .token-led{display:none;}

  [data-status="done"] .token-badge-face::after{
    content:'\2713'; position:absolute; inset:0; z-index:3; display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; color:var(--st); background:rgba(5,7,15,.55);
    animation:tokenDoneFlash 1.3s ease-out forwards;
  }
  @keyframes tokenDoneFlash{0%{opacity:0;} 18%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;}}

  .token-shadow{
    position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:6px;
    width:20px; height:5px; border-radius:50%; background:rgba(0,0,0,.5); filter:blur(1px);
  }
  .token-shadow.arrive{animation:shadowPulse .4s ease;}
  @keyframes shadowPulse{0%{transform:translateX(-50%) scale(2); opacity:.15;} 100%{transform:translateX(-50%) scale(1); opacity:1;}}

  .token-name{
    position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:14px;
    font-family:'Orbitron',sans-serif; font-size:.4rem; color:#fff; text-shadow:0 0 4px rgba(0,0,0,.9); white-space:nowrap;
  }

  /* ============ WALL: CLOCK + USAGE MONITORS ============
     Three equal-height boxes mounted on the back wall: a live date/time
     CLOCK (with the weekly-reset countdown), a WEEKLY monitor (overall +
     Fable bars), and a 5-HOUR monitor. All share .wall-box so they're the
     exact same height and read as a matched set; widths are % of the floor
     so they scale WITH the wall. Height is a touch under the 13% wall band.
     Lines are kept short enough to never need truncation. Inside
     .floor-camera, so pinch-zoom magnifies them. */
  .wall-box{
    position:absolute; transform:translateX(-50%); top:1.4%; height:10.4%;
    box-sizing:border-box; padding:2px 5px; border-radius:3px;
    background:#04060f; border:1px solid #2a3158;
    box-shadow:0 0 8px rgba(6,182,212,.15), inset 0 0 6px rgba(0,0,0,.8);
    font-family:'VT323',monospace; z-index:1;
    display:flex; flex-direction:column; justify-content:center; gap:1px; overflow:hidden;
  }
  .ws-head{display:flex; align-items:center; justify-content:space-between;}
  .ws-title{font-family:'Orbitron',sans-serif; font-size:5px; letter-spacing:.5px; color:#7c8ab0; white-space:nowrap;}
  .ws-led{width:3px; height:3px; border-radius:50%; background:#10b981; box-shadow:0 0 4px #10b981; animation:tokenLedBlink 2s ease-in-out infinite; flex-shrink:0;}
  .ws-led.warn{background:#e63946; box-shadow:0 0 5px #e63946; animation-duration:.6s;}
  .ws-bar{height:3px; border-radius:2px; background:#11142a; border:1px solid #232742; overflow:hidden;}
  .ws-fill{display:block; height:100%; width:0%; background:linear-gradient(90deg,#10b981,#06b6d4); transition:width .8s ease;}
  .ws-fill.mid{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
  .ws-fill.hot{background:linear-gradient(90deg,#e63946,#f97316);}
  .ws-line{font-size:8px; line-height:1.15; color:#9096b5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ws-line b{color:#e2e4f0; font-weight:400;}
  .ws-fline{color:#9096b5;}
  .ws-warn{display:none;}
  /* live per-session token counter on the 5-hour monitor: dim at rest,
     glows cyan while the office's session is actively working */
  .ws-stok{color:#7c8ab0; transition:color .3s, text-shadow .3s;}
  .office.working .ws-stok{color:#22d3ee; text-shadow:0 0 5px rgba(34,211,238,.7);}
  .ws-alltime{color:#9096b5;}
  /* live clock box */
  .wc-date{font-family:'Orbitron',sans-serif; font-size:5.5px; letter-spacing:1px; color:#7c8ab0; text-align:center; white-space:nowrap;}
  .wc-time{font-size:14px; line-height:1; color:#22d3ee; text-shadow:0 0 5px rgba(34,211,238,.5); letter-spacing:1px; text-align:center; white-space:nowrap;}
  .wc-reset{font-size:7px; color:#ffb347; text-align:center; white-space:nowrap; min-height:8px;}
  /* Tally, the accountant — static office staff at his desk under the
     monitor. Not a session token: no events, no bubbles, just vibes. */
  .staff{position:absolute; transform:translate(-50%,-50%); z-index:1; pointer-events:none;}
  .staff-face{width:26px; height:26px; animation:tokenBob 3.4s ease-in-out infinite; filter:drop-shadow(0 0 7px #10b981);}
  .staff-face svg{width:100%; height:100%; display:block;}
  .staff-name{position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:1px; font-family:'Orbitron',sans-serif; font-size:.38rem; color:#fff; text-shadow:0 0 4px rgba(0,0,0,.9); white-space:nowrap;}
  /* Tally's bubble opens SIDEWAYS (to his right) — a bubble above his head
     would cover the wall monitor he stands under. */
  .staff-bubble{
    position:absolute; left:130%; top:40%; transform:translateY(-50%);
    width:max-content; max-width:112px; padding:3px 6px; border-radius:8px;
    background:#11142a; border:1px solid #10b981; color:#e2e4f0;
    font-family:'VT323',monospace; font-size:.72rem; line-height:1.25; text-align:center;
    opacity:0; transition:opacity .25s; z-index:4;
  }
  .staff-bubble.show{opacity:1;}
  .staff-bubble::after{
    content:''; position:absolute; right:100%; top:50%; transform:translateY(-50%);
    border:5px solid transparent; border-right-color:#10b981;
  }

  /* ============ DIALOGUE + EVENT LOG PANELS ============ */
  #panels{display:grid; grid-template-columns:1.4fr 1fr; gap:18px; align-items:start;}
  .panel-head{
    font-family:'Orbitron',sans-serif; font-size:.62rem; font-weight:700; letter-spacing:1.5px;
    color:#7c8ab0; margin-bottom:6px; display:flex; justify-content:space-between; align-items:baseline; gap:10px;
  }
  .panel-head .hint{font-family:'VT323',monospace; font-size:.85rem; color:#4a5070; letter-spacing:0; font-weight:400;}

  /* Chat feed: every speech-bubble line, un-truncated, newest at the bottom
     (column-reverse keeps it auto-pinned there, same trick as #log). Colour
     carries importance: real speech cyan, prompts amber, delegation purple,
     arrivals/handbacks green, errors red, lounge banter dim italic. */
  #chat{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; height:200px; overflow-y:auto; font-size:16px;
    display:flex; flex-direction:column-reverse;
  }
  #chat .cline{line-height:1.45; word-break:break-word;}
  #chat .cline .t{color:#3f4468; margin-right:6px;}
  #chat .cline .who{margin-right:6px;}
  /* Long lines (> ~220 chars) clamp to 3 lines with a tap-to-expand toggle —
     the FULL text is always in the DOM, the clamp is display-only. Expanded
     view renders the message's own paragraph breaks (pre-wrap). */
  #chat .cline.clamped{cursor:pointer;}
  #chat .cline.clamped .txt{display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:3; overflow:hidden;}
  #chat .cline.clamped.open .txt{-webkit-line-clamp:unset; white-space:pre-wrap;}
  #chat .cline-more{color:#5a6089; font-size:.85em; margin-left:2px; user-select:none;}
  #chat .cline.clamped:hover .cline-more{color:#9096b5;}
  .k-speech .who{color:#22d3ee;}   .k-speech .txt{color:#e2e4f0;}
  .k-prompt .who{color:#f59e0b;}   .k-prompt .txt{color:#e8d5a8;}
  .k-delegate .who{color:#a78bfa;} .k-delegate .txt{color:#cfc3f7;}
  .k-arrive .who,.k-handback .who{color:#10b981;} .k-arrive .txt,.k-handback .txt{color:#9fdec4;}
  .k-error .who{color:#e63946;}    .k-error .txt{color:#f3a7ae;}
  .k-status .who{color:#7c8ab0;}   .k-status .txt{color:#6b7094;}
  .k-banter .who{color:#8890b8;}   .k-banter .txt{color:#7d84ad; font-style:italic;}

  #log{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; height:200px; overflow-y:auto; font-size:15px; color:#6b7094;
    display:flex; flex-direction:column-reverse;
  }
  #log .line{white-space:pre-wrap; word-break:break-all; line-height:1.4;}
  #log .line .t{color:#3f4468;}
  #log .line .ev{color:var(--cyan);}
  /* "moment" lines — home/holiday/handover/sign-off. Stand out (amber, a
     left rule, faintly boxed) so a user whose screen was off can scroll the
     log and spot exactly when the office emptied. */
  #log .line.moment{border-left:2px solid #ffb347; padding-left:6px; margin:2px 0; background:rgba(245,158,11,.06);}
  #log .line.moment .mo{color:#ffcf8a;}

  /* ============ MOBILE ============ */
  @media (max-width:640px){
    body{font-size:16px;}
    header{padding:10px 14px;}
    header h1{font-size:16px; letter-spacing:1px;}
    .hdr-right{font-size:12px; gap:10px;}
    main{padding:14px; gap:16px;}
    #floor{grid-template-columns:1fr; gap:18px;}
    .office{padding:10px; border-radius:10px;}
    .office-plaque{font-size:.62rem;}
    .office-cwd{font-size:.85rem;}
    .office-floor{height:340px; border-radius:6px;}
    /* phone wall band is only ~44px tall and narrow — shrink the text a
       touch and hide decorative props (m-hide) so the three boxes fit */
    .ws-line{font-size:6.8px;}
    .ws-title{font-size:4.5px;}
    .wc-date{font-size:4.6px;}
    .wc-time{font-size:11px;}
    .wc-reset{font-size:6px;}
    .ws-model{display:none;}
    .m-hide{display:none;}
    .zone{padding:2px 6px; gap:4px;}
    .zone-icon{width:9px; height:9px;}
    .zone-label{font-size:.3rem;}
    .prop{transform:translate(-50%,-50%) scale(.8);}
    .token-badge{width:17px; height:17px;}
    .token-main .token-badge{width:23px; height:23px;}
    .token-bubble{font-size:.7rem; max-width:118px; padding:3px 6px; margin-bottom:calc(7px + var(--tier, 0) * 26px + var(--lift, 0px));}
    .token-bubble.below{margin-bottom:0; margin-top:calc(22px + var(--tier, 0) * 26px + var(--lift, 0px));}
    /* one line fewer than desktop — a short phone floor can't stack two
       6-line bubbles without running past the floor's top edge */
    .token-bubble .tb-text{-webkit-line-clamp:5;}
    .token-name{font-size:.34rem; margin-top:12px;}
    #panels{grid-template-columns:1fr; gap:14px;}
    #chat{height:170px; font-size:14px; padding:8px 10px;}
    #log{height:120px; font-size:13px; padding:8px 10px;}
  }
</style>
</head>

function escHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function truncate(s, n){
  s = String(s == null ? '' : s);
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}
function basename(p){
  if(!p) return 'unknown';
  const parts = String(p).replace(/[\\/]+$/,'').split(/[\\/]/);
  return parts[parts.length - 1] || p;
}
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
// Occupants of the same zone get evenly spread, deterministic slots based on
// their position in that zone's occupant list — NOT per-token hash jitter.
// Hash jitter looked fine for one-off collisions, but two FIXED tokens (e.g.
// the "usual crew" pair) hash to the exact same relative offsets every single
// render, so if they ever happened to land close together, they'd stay
// stuck overlapping permanently rather than just "unluckily" that one time.
function zoneToPos(zoneKey, index, count){
  const z = ZONES[zoneKey] || ZONES.lounge;
  if(count <= 1) return { x: clamp(z.x, 10, 90), y: clamp(z.y, 11, 92) };
  // Lounge spacing keeps 4 occupants inside the (now much wider) lounge box;
  // collision-proofing no longer rides on spacing alone — the 2-line bubble
  // clamp + 44px tier step guarantee it (see .token-bubble CSS).
  // Same-tier neighbours are 2 slots apart, and 2 spacings must exceed a
  // bubble's full width even on a phone floor (~28pp ≥ 92px at 340px wide).
  const spacing = Math.min(zoneKey === 'lounge' ? 16 : 14, 72 / (count - 1));
  const totalWidth = spacing * (count - 1);
  // Clamp the GROUP, not each slot — clamping slots individually squashed
  // the two edge-most occupants together and their same-tier bubbles touched
  // (caught on a 390px viewport: planning room at x22 with 3 people).
  const startX = clamp(z.x - totalWidth / 2, 14, 86 - totalWidth);
  const x = startX + index * spacing;
  // Stagger sign is tied to the bubble tier (tier = idx % 2, see render()):
  // even/tier-0 occupants stand LOWER, odd/tier-1 ones HIGHER, so the body
  // stagger ADDS to the bubbles' vertical separation. The old opposite sign
  // subtracted from it — it raised the low-bubble body and lowered the
  // high-bubble body, eating ~24px of the tier gap and letting two full
  // 2-line bubbles overlap (caught by real bounding-box measurement).
  const y = z.y + (index % 2 === 0 ? 1 : -1) * 2.4;
  return { x: x, y: clamp(y, 11, 92) };
}
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

// evt._speech (set server-side from the session's own transcript — see
// server.js) is the actual text Claude said right before/around this event,
// not a mechanical description of the tool call. Strip markdown noise and
// collapse whitespace so it reads cleanly in a small speech bubble.
function cleanSpeech(text, maxLen){
  const t = String(text)
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/^#+\s*/gm, '')
    .replace(/\s+/g, ' ')
    .trim();
  return t ? truncate(t, maxLen || 72) : null;
}
// Full-length variant for the DIALOGUE panel — the bubble clamps at 6
// lines; the chat feed is where a long message gets read IN FULL. Unlike
// the bubble cleaner it preserves paragraph breaks (rendered when a long
// line is expanded), and its 4000-char cap is a safety net, not a display
// length — a long conclusion message used to get chopped at 400 chars,
// which defeated the whole "full speech lives in the chat" contract.
function cleanSpeechFull(text){
  const t = String(text)
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/^#+\s*/gm, '')
    .replace(/[ \t]+/g, ' ')
    .replace(/\s*\n\s*/g, '\n')
    .replace(/\n{2,}/g, '\n')
    .trim();
  return t ? truncate(t, 4000) : null;
}

function zoneForTool(name){
  if(name === 'Bash') return 'terminal';
  if(name === 'Read' || name === 'Write' || name === 'Edit') return 'archives';
  if(name === 'Grep' || name === 'Glob' || name === 'WebFetch' || name === 'WebSearch') return 'research';
  if(name === 'Agent' || name === 'Task') return 'warroom';
  return 'terminal';
}
function doingText(name, input){
  input = input || {};
  if(!name) return 'Working on it.';
  if(name === 'Bash') return 'Running: ' + truncate(input.command || '', 40);
  if(name === 'Read') return 'Reading ' + basename(input.file_path);
  if(name === 'Write') return 'Writing ' + basename(input.file_path);
  if(name === 'Edit') return 'Editing ' + basename(input.file_path);
  if(name === 'Grep') return 'Searching for ‘' + truncate(input.pattern || '', 28) + '’';
  if(name === 'Glob') return 'Looking for ‘' + truncate(input.pattern || '', 28) + '’ files';
  if(name === 'WebFetch') return 'Fetching ' + truncate(input.url || '', 34);
  if(name === 'WebSearch') return 'Searching: ' + truncate(input.query || '', 34);
  if(name === 'Agent' || name === 'Task') {
    // Same codename the arriving subagent will wear (see ensureSubagent), so
    // "Sending Scout to: ..." matches the Scout that walks in moments later.
    return 'Sending ' + codenameForAgentType(input.subagent_type) + ' to: ' + truncate(input.description || 'help out', 34);
  }
  return 'Using ' + name + '.';
}
/* ---- Dispatch, the user's courier ----
   The user isn't an agent in the office — they're the person SENDING the
   work. So every new prompt is delivered in person: "Dispatch" (a mail
   carrier sprite) walks in through the EXIT door, crosses to Planning,
   hands the boss the request in a bubble, then heads back out the door and
   is gone. Pure client-side choreography off UserPromptSubmit; not a
   session entity, so it never affects crew/subagent logic. */
const COURIER_EXIT_LINES = [
  'Signed, sealed, delivered.', 'Another one for the pile. Good luck!',
  'Back to HQ.', 'They said it’s urgent. They always say that.',
  'No rush. (It’s a rush.)',
];
function clearCourierTimers(s){
  (s.courierTimers || []).forEach(clearTimeout);
  s.courierTimers = [];
}
function dispatchCourier(s, promptText){
  clearCourierTimers(s);
  const teaser = truncate(String(promptText || 'new request').replace(/\s+/g, ' '), 90);
  s.courier = { zone: 'exit', status: 'courier', bubble: null };
  chatLog('Dispatch', '📨 New request: ' + truncate(String(promptText || 'new request').replace(/\s+/g, ' '), 240), 'prompt');
  render();
  s.courierTimers.push(setTimeout(function(){
    if(!s.courier) return;
    s.courier.zone = 'warroom';
    s.courier.bubble = '📨 From the user: “' + teaser + '”';
    render();
  }, 150));
  s.courierTimers.push(setTimeout(function(){
    if(!s.courier) return;
    s.courier.bubble = pick(COURIER_EXIT_LINES);
    s.courier.zone = 'exit';
    render();
  }, 5400));
  s.courierTimers.push(setTimeout(function(){
    s.courier = null;
    render();
  }, 7200));
}

function ensureSession(sid, evt){
  let s = sessions.get(sid);
  if(!s){
    s = {
      id: sid, cwd: basename(evt.cwd), avatar: avatarForSession(sid), modelNickname: null,
      status: 'idle', zone: 'lounge', bubble: null, lastEventAt: Date.now(),
      subagents: new Map(), removeTimer: null,
      lastDelegation: null, lastDelegationAt: 0,
      courier: null, courierTimers: [],
      model: null, departing: null, departTimers: [],
    };
    sessions.set(sid, s);
  }
  if(evt.cwd) s.cwd = basename(evt.cwd);
  s.lastEventAt = Date.now();
  if(s.removeTimer){ clearTimeout(s.removeTimer); s.removeTimer = null; }
  return s;
}
function ensureSubagent(s, aid, evt){
  let a = s.subagents.get(aid);
  if(!a){

    // If a second live subagent of the same type is already on the floor,
    // suffix a numeral so two Scouts working at once stay tellable apart.
    const base = codenameForAgentType(evt.agent_type);
    let dupes = 0;
    s.subagents.forEach(function(other){ if(other.codenameBase === base) dupes++; });
    a = {
      id: aid, agentType: evt.agent_type || 'agent', avatar: avatarForAgentType(evt.agent_type), modelNickname: null,
      codenameBase: base,
      codename: dupes === 0 ? base : base + ' ' + (['II','III','IV','V'][dupes - 1] || (dupes + 1)),
      status: 'thinking', zone: 'warroom', bubble: base + ' reporting in.',
      lastEventAt: Date.now(), removeTimer: null, settleTimer: null,
    };
    s.subagents.set(aid, a);
  }
  a.lastEventAt = Date.now();
  if(a.removeTimer){ clearTimeout(a.removeTimer); a.removeTimer = null; }
  return a;
}
function maybeSetModel(entity, evt){
  if(!evt.model || /synthetic/i.test(evt.model)) return; // '<synthetic>' transcript entries aren't a real model
  if(!entity.model){
    entity.model = evt.model;
    entity.modelNickname = nicknameForModel(evt.model);
    // Lock the face to the model as soon as we know it (a fixed per-model
    // avatar overrides the session-hashed placeholder).
    var a0 = avatarForModel(evt.model);
    if(a0) entity.avatar = a0;
    return;
  }
  if(evt.model !== entity.model){
    // The serving model actually changed — which is exactly what happens
    // when a premium model (Fable) hits its weekly cap and the session
    // falls back. Play the handover: old persona walks out with a farewell,
    // new persona takes the chair. Only main sessions carry a model.
    const oldNick = entity.modelNickname;
    const oldModel = entity.model;
    const oldAvatar = entity.avatar; // the outgoing face — the ghost walks out wearing it
    entity.model = evt.model;
    entity.modelNickname = nicknameForModel(evt.model);
    var na = avatarForModel(evt.model);
    if(na) entity.avatar = na; // new model → new fixed face
    // Handover only when the PERSONA changes, not the raw string. A "/model"
    // switch is announced twice — first as the command's display name
    // ("Fable 5", parsed from the transcript the moment the command runs),
    // then as the real id ("claude-fable-5") once the model first responds.
    // Both map to the same nickname, so the second arrival updates silently
    // instead of replaying Fabby-hands-over-to-Fabby.
    if(entity.subagents && entity.modelNickname !== oldNick) playModelHandover(entity, oldNick, oldModel, oldAvatar);
  }
}

function clearDepartTimers(s){
  (s.departTimers || []).forEach(clearTimeout);
  s.departTimers = [];
}
// The old persona walks out (grayscale) while the new model takes the chair.
// Three flavours: HOLIDAY (its weekly/fable meter is actually exhausted),
// LIMIT-HOME (the 5h window is spent), or a plain SHIFT CHANGE — a manual
// model switch at the terminal, which must NOT falsely claim "hit my limit".
function playModelHandover(s, oldNick, oldModel, oldAvatar){
  clearDepartTimers(s);
  const wk = (_usageData && _usageData.weekly) || {};
  const blk = (_usageData && _usageData.block) || {};
  const wasFable = /fable/i.test(oldModel || '');
  // Only narrate a LIMIT handover ("hit my limit / on holiday") on a real
  // signal — an ANCHORED weekly that's maxed, or an actual rate-limit warning.
  // Otherwise a plain /model switch at ~48% real usage would falsely claim the
  // outgoing model got capped. Everything else is a normal shift change.
  const anchored = wk.source === 'anchored';
  const warn = !!(_usageData && _usageData.warning);
  const holiday = anchored && ((wasFable && wk.fable && wk.fable.usedPct >= 95) || (wk.usedPct || 0) >= 95);
  const limitHome = !holiday && warn;
  const resetTxt = holiday
    ? (wk.resetDays ? '~' + wk.resetDays + ' day' + (wk.resetDays > 1 ? 's' : '') : 'a few days')
    : (blk.resetInMs != null ? fmtDur(blk.resetInMs) : 'a bit');
  const incTitle = modelRank(s.model).title; // Director / Manager / Lead / Senior Staff / Boss
  let bye, arrive, moment;
  if(holiday){
    bye = 'That’s my week, folks. Holiday time — back in ' + resetTxt + '. ' + s.modelNickname + ', the office is yours.';
    arrive = 'Covering while ' + oldNick + ' holidays. The office is in good hands.';
    moment = '🏖 ' + oldNick + ' left for holiday — ' + s.modelNickname + ' took over the office';
  } else if(limitHome){
    bye = 'Hit my limit — heading home for ' + resetTxt + '. ' + s.modelNickname + ', take the chair.';
    arrive = 'Taking over from ' + oldNick + '. Business as usual.';
    moment = '🏠 ' + oldNick + ' headed home — ' + s.modelNickname + ' took over the office';
  } else {
    // manual model switch — a normal shift change, no limit claim. The
    // incoming persona clocks in under their office title (Director/Manager/…).
    bye = 'Shift change — ' + incTitle + ' ' + s.modelNickname + ', the desk is yours. Later, all.';
    arrive = incTitle + ' ' + s.modelNickname + ' clocking in. Thanks for holding it down, ' + oldNick + '.';
    moment = '🔄 Model switch — ' + incTitle + ' ' + s.modelNickname + ' took over from ' + oldNick;
  }
  // Staged like an actual shift change (was: new persona teleporting into
  // the lounge while the old one ghosted out — caught via user feedback):
  //  1. The outgoing persona STAYS at their desk, in colour, while the
  //     incoming one enters through the door (exit zone) and walks over.
  //  2. They meet: farewell + takeover lines exchanged, the outgoing one
  //     goes grayscale (offline) — off shift as of this moment.
  //  3. The crew rib the incoming boss by rank (playShiftBanter).
  //  4. The outgoing persona walks out the door and disappears.
  // The token left/top transition (1.7s) does the walking; timers just set
  // zones, so every delay below is paced off that 1.7s stroll.
  const meetZone = (s.zone && s.zone !== 'exit') ? s.zone : 'lounge'; // where the old boss is standing
  const outModel = oldModel; // capture for the crew banter closure
  // The ghost keeps the OUTGOING model's face (s.avatar is already the new
  // one by now); fall back to the current avatar if none was captured.
  s.departing = { zone: meetZone, status: 'idle', bubble: null, name: oldNick || 'old boss', avatar: oldAvatar || s.avatar };
  s.zone = 'exit'; // the new persona appears AT THE DOOR...
  s.bubble = null;
  logMoment(moment);
  // The main token is the one being re-badged, and it's currently standing at
  // meetZone — left alone it would WALK to the door, reading as the newcomer
  // backing out before entering. Snap it to the door with transitions off for
  // one frame instead; the departing ghost (identical sprite) stays at the
  // desk, so the eye reads "old boss still here, new face at the door."
  const _hoOffice = officeEls.get(s.id);
  const _hoMain = _hoOffice && _hoOffice.tokens.get('__main__');
  if(_hoMain) _hoMain.wrap.style.transition = 'none';
  render();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    if(_hoMain) _hoMain.wrap.style.transition = '';
  }); });
  // (1→2) after a beat at the threshold, the newcomer strolls in to meet them
  s.departTimers.push(setTimeout(function(){
    if(!s.departing) return;
    if(s.zone === 'exit') s.zone = meetZone; // walk door → desk (unless real work already moved us)
    render();
  }, 300));
  // meet: exchange lines, old shift goes grayscale (paced after the 1.7s walk)
  s.departTimers.push(setTimeout(function(){
    if(!s.departing) return;
    s.departing.bubble = bye;
    s.departing.status = 'offline';
    s.bubble = arrive;
    chatLog(oldNick || 'boss', bye, 'delegate');
    chatLog(s.modelNickname, arrive, 'arrive');
    armBubbleFade(s, 12000);
    render();
  }, 2100));
  // (3) the crew weigh in on the new boss's rank
  s.departTimers.push(setTimeout(function(){
    playShiftBanter(s.id, s.model, outModel);
  }, 3200));
  // (4) old shift walks out the door…
  s.departTimers.push(setTimeout(function(){
    if(!s.departing) return;
    s.departing.zone = 'exit';
    render();
  }, 5200));
  // …and is gone (after the 1.7s walk to the door completes)
  s.departTimers.push(setTimeout(function(){
    s.departing = null;
    render();
  }, 7400));
}
function displayName(entity){
  // Main session: model nickname ("Fabby") when known. Subagents never get a
  // model (their turns aren't in the main transcript), so they wear their
  // codename ("Scout"); the roster avatar name is the last resort.
  return entity.modelNickname || entity.codename || entity.avatar.name;
}

// A bubble is said once, then fades — after `ms` it clears (only if it hasn't
// changed since). Fixes the "stuck bubble" bug: previously only IDLE bubbles
// faded (armIdleFade), so the last words of a turn — a "Done with X." after a
// tool, or an active line when the session then went quiet — hung over the
// avatar's head forever until the next event happened to speak. Now EVERY
// event's resulting bubble is armed to fade, regardless of status.
function armBubbleFade(entity, ms){
  if(entity.bubbleFadeTimer) clearTimeout(entity.bubbleFadeTimer);
  if(!entity.bubble) return;
  const armed = entity.bubble;
  entity.bubbleFadeTimer = setTimeout(function(){
    if(entity.bubble === armed){
      entity.bubble = null;
      entity.speechBubble = false;
      render();
    }
  }, ms || 12000);
}

function handleEvent(evt){
  const name = evt.hook_event_name;
  // SpeechTick/ModelTick are synthetic (server-side transcript watcher), not
  // real hooks — keep them out of the event counter and the event log.
  if(name !== 'SpeechTick' && name !== 'ModelTick'){
    evtCount++;
    evtCountEl.textContent = evtCount + ' event' + (evtCount === 1 ? '' : 's');
    logLine(evt);
  }

  const sid = evt.session_id || 'unknown-session';
  const s = ensureSession(sid, evt);
  const aid = evt.agent_id || null;
  const target = aid ? ensureSubagent(s, aid, evt) : s;
  maybeSetModel(target, evt);
  if(evt._sessionTokens != null) s.sessionTokens = evt._sessionTokens; // live per-session counter
  // real work resuming reopens an office that had emptied for a limit
  if(name === 'UserPromptSubmit' || name === 'PreToolUse' || name === 'SubagentStart') reopenOffice(sid);

  // Track whether the current bubble is actual SPEECH (transcript text) vs
  // a mechanical status line — Stop uses it to let just-said words linger.
  const hadSpeechBubble = !!target.speechBubble;
  if(name !== 'SpeechTick' && name !== 'ModelTick') target.speechBubble = false;

  switch(name){
    case 'SessionStart':
      s.status = 'idle'; s.zone = 'lounge'; s.bubble = 'Just got in (' + (evt.source || 'startup') + ').';
      chatLog(displayName(s), s.bubble, 'status');
      break;
    case 'UserPromptSubmit':
      target.status = 'thinking'; target.zone = 'warroom';
      target.bubble = 'Thinking: ' + truncate(evt.user_input || evt.prompt || 'new request', 140);
      // Dispatch owns the prompt in the chat feed (one amber line, not two)
      // and physically walks it in through the exit door.
      dispatchCourier(s, evt.user_input || evt.prompt);
      break;
    case 'SubagentStart':
      target.status = 'thinking'; target.zone = 'warroom';
      // If the boss just announced a handoff ("Sending Scout to: ...")
      // moments ago, echo that specific task back instead of a generic
      // greeting — reads like an actual reply to being deployed, not two
      // unrelated status lines that happen to sit next to each other.
      if(s.lastDelegation && (Date.now() - s.lastDelegationAt) < DELEGATION_WINDOW_MS){
        target.bubble = 'Got it — ' + s.lastDelegation;
        s.lastDelegation = null;
      } else {
        target.bubble = pick(ARRIVAL_LINES);
      }
      chatLog(displayName(target), target.bubble, 'arrive');
      break;
    case 'PreToolUse':
      target.status = 'active'; target.zone = zoneForTool(evt.tool_name);
      // Prefer what Claude actually said over a mechanical tool description —
      // falls back when the transcript had no text alongside this tool call
      // (e.g. a tool-only turn with no preceding commentary).
      target.bubble = (evt._speech && cleanSpeech(evt._speech, 220)) || doingText(evt.tool_name, evt.tool_input);
      target.speechBubble = !!evt._speech;
      // Real speech is the interesting part of the feed — log it in full.
      // Mechanical "Reading x.js" lines are deliberately NOT fed to the chat;
      // the event log right next to it already lists every tool call.
      if(evt._speech) chatLog(displayName(target), cleanSpeechFull(evt._speech), 'speech');
      if(!aid && (evt.tool_name === 'Agent' || evt.tool_name === 'Task')){
        s.lastDelegation = truncate((evt.tool_input && evt.tool_input.description) || 'help out', 40);
        s.lastDelegationAt = Date.now();
        chatLog(displayName(s), 'Sending ' + codenameForAgentType(evt.tool_input && evt.tool_input.subagent_type)
          + ' to: ' + truncate((evt.tool_input && evt.tool_input.description) || 'help out', 160), 'delegate');
      }
      break;
    case 'PostToolUse':
      target.status = 'calm';
      // The speechSent gate attaches a given quote to exactly ONE event —
      // if this happens to be the event that got it, show it rather than
      // silently consuming it (else that line would never appear anywhere).
      if(evt._speech){
        target.bubble = cleanSpeech(evt._speech, 220);
        target.speechBubble = true;
        chatLog(displayName(target), cleanSpeechFull(evt._speech), 'speech');
      } else {
        target.bubble = 'Done with ' + (evt.tool_name || 'that') + '.';
      }
      break;
    case 'PostToolUseFailure':
      target.status = 'error';
      target.bubble = (evt.tool_name || 'That') + ' didn’t work.';
      chatLog(displayName(target), target.bubble, 'error');
      // failure keeps the error bubble, but any attached speech still
      // reaches the dialogue feed so the line isn't lost
      if(evt._speech) chatLog(displayName(target), cleanSpeechFull(evt._speech), 'speech');
      break;
    case 'SubagentStop':
      // Head to the lounge (not straight out the door) — settling there
      // idle for a few seconds is what makes it a candidate for lounge
      // small-talk with whoever else (including the boss) is parked there.
      target.status = 'done'; target.zone = 'lounge'; target.bubble = pick(HANDBACK_LINES);
      chatLog(displayName(target), target.bubble, 'handback');
      if(aid){
        target.removeTimer = setTimeout(function(){ s.subagents.delete(aid); render(); }, 6000);
        // Settling to idle DROPS the bubble — someone who isn't talking
        // shouldn't have a speech bubble hovering over them.
        target.settleTimer = setTimeout(function(){
          if(s.subagents.has(aid)){ target.status = 'idle'; target.bubble = null; render(); }
        }, 1500);
      }
      break;
    case 'Stop':
      // Head to the lounge with the turn's closing words — fresh transcript
      // text if there is any, else keep the speech already on screen (the
      // dedup gate means Stop often arrives just after a SpeechTick already
      // showed the final line). Either way it's said once and then fades
      // (armIdleFade) — never a permanent bubble, and never a filler
      // "Standing by." over someone who isn't talking.
      target.status = 'idle'; target.zone = 'lounge';
      if(evt._speech){
        target.bubble = cleanSpeech(evt._speech, 220);
        target.speechBubble = true;
        chatLog(displayName(target), cleanSpeechFull(evt._speech), 'speech');
      } else if(hadSpeechBubble && target.bubble){
        target.speechBubble = true; // keep the just-said words on screen
      } else {
        target.bubble = null;
      }
      break;
    case 'SpeechTick':
      // Synthetic: the server watched the transcript and Claude just said
      // something new — update the bubble right away instead of waiting for
      // the next tool event. Zone/status stay wherever the real events put
      // them.
      if(evt._speech){
        target.bubble = cleanSpeech(evt._speech, 220);
        target.speechBubble = true;
        chatLog(displayName(target), cleanSpeechFull(evt._speech), 'speech');
      }
      break;
    case 'ModelTick':
      // Synthetic: the server spotted a model change in the transcript
      // (e.g. /model at the terminal, which fires no hook). maybeSetModel
      // above already played the handover — leave bubble/zone/status alone.
      break;
    case 'SessionEnd':
      s.status = 'offline'; s.zone = 'exit'; s.bubble = 'Signing off.';
      s.courier = null; clearCourierTimers(s);
      s.departing = null; clearDepartTimers(s);
      // Power the WHOLE office down together: every subagent goes offline and
      // heads for the door too, instead of freezing at its last "working"
      // status while the boss walks out alone. On /clear the office is
      // closing, so everyone leaves — then the removeTimer disappears it.
      s.subagents.forEach(function(a){
        if(a.removeTimer){ clearTimeout(a.removeTimer); a.removeTimer = null; }
        if(a.settleTimer){ clearTimeout(a.settleTimer); a.settleTimer = null; }
        if(a.bubbleFadeTimer){ clearTimeout(a.bubbleFadeTimer); a.bubbleFadeTimer = null; }
        a.status = 'offline'; a.zone = 'exit'; a.bubble = null;
      });
      chatLog(displayName(s), s.bubble, 'status');
      logMoment('👋 ' + displayName(s) + ' signed off — office closing (' + s.cwd + ')');
      s.removeTimer = setTimeout(function(){ sessions.delete(sid); render(); }, 8000);
      break;
    default:
      target.bubble = name || target.bubble;
  }
  // every event's resulting bubble fades after a while unless replaced —
  // no more bubbles stuck over an avatar's head until the next time it speaks
  // (ModelTick changes no bubble, so don't reset the current one's fade clock)
  if(name !== 'SessionEnd' && name !== 'ModelTick') armBubbleFade(target, 12000);
  render();
}

/* The DIALOGUE feed: everything anyone says, full-length, colour-coded by
   how much it matters (kind → .k-* CSS). Newest at the bottom; the
   column-reverse flex keeps it auto-pinned there. */
const chatEl = document.getElementById('chat');
const CHAT_CLAMP_CHARS = 220; // longer than this → clamped to 3 lines with a "more" toggle
let _lastChatKey = '';
function chatLog(who, text, kind){
  if(!text) return;
  const key = who + '|' + text;
  if(key === _lastChatKey) return; // replays/re-renders repeat lines back-to-back
  _lastChatKey = key;
  const long = text.length > CHAT_CLAMP_CHARS;
  const div = document.createElement('div');
  div.className = 'cline k-' + (kind || 'status') + (long ? ' clamped' : '');
  div.innerHTML = '<span class="t">[' + new Date().toLocaleTimeString() + ']</span>'
    + '<span class="who">' + escHtml(who) + ':</span>'
    + '<span class="txt">' + escHtml(text) + '</span>'
    + (long ? '<span class="cline-more">▾ more</span>' : '');
  chatEl.insertBefore(div, chatEl.firstChild);
  while(chatEl.children.length > 120) chatEl.removeChild(chatEl.lastChild);
}
// Tap/click a long line to expand it (and again to collapse). The full text
// is always in the DOM — the clamp is display-only.
chatEl.addEventListener('click', function(e){
  const line = e.target.closest('.cline.clamped');
  if(!line) return;
  line.classList.toggle('open');
  const more = line.querySelector('.cline-more');
  if(more) more.textContent = line.classList.contains('open') ? '▴ less' : '▾ more';
});

function logLine(evt){
  const t = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'line';
  const bits = [evt.hook_event_name || 'event'];
  if(evt.agent_type) bits.push('(' + evt.agent_type + ')');
  if(evt.tool_name) bits.push('→ ' + evt.tool_name);
  div.innerHTML = '<span class="t">[' + t + ']</span> <span class="ev">' + escHtml(bits.join(' ')) + '</span> ' + escHtml(basename(evt.cwd));
  logEl.insertBefore(div, logEl.firstChild);
  while(logEl.children.length > 60) logEl.removeChild(logEl.lastChild);
}

// A persistent, timestamped record of the "office emptied" moments —
// clock-out (5h spent), holiday (weekly spent), model handover, sign-off —
// pinned into the EVENT LOG so a user whose phone was asleep can scroll
// back and see exactly when it happened. Deduped so it can't spam.
let _lastMoment = '';
function logMoment(text){
  if(text === _lastMoment) return;
  _lastMoment = text;
  const div = document.createElement('div');
  div.className = 'line moment';
  div.innerHTML = '<span class="t">[' + new Date().toLocaleTimeString() + ']</span> <span class="mo">' + escHtml(text) + '</span>';
  logEl.insertBefore(div, logEl.firstChild);
  while(logEl.children.length > 60) logEl.removeChild(logEl.lastChild);
}

function officeSkeletonHtml(){
  // Paint order (DOM order): wall → room mats → furniture → sign plates →
  // people. Mats are the rooms; the zone element is just the sign on the
  // mat's top edge (occupants still gather at the zone anchor = mat centre).
  const matsHtml = Object.keys(ROOM_MATS).map(function(key){
    const z = ZONES[key], m = ROOM_MATS[key];
    return '<div class="room-mat" data-mat="' + key + '" style="left:' + z.x + '%;top:' + z.y + '%;width:' + m.w + '%;height:' + m.h + '%;background:' + m.bg + '"></div>';
  }).join('');
  const propsHtml = PROPS.map(function(p){
    const w = p.wpct ? p.wpct + '%' : p.w + 'px';
    const cls = 'prop' + (p.flat ? ' prop-flat' : '') + (p.cls ? ' ' + p.cls : '');
    return '<div class="' + cls + '" style="left:' + p.x + '%;top:' + p.y + '%;width:' + w + '">' + PROP_ART[p.art] + '</div>';
  }).join('');
  const zonesHtml = Object.keys(ZONES).map(function(key){
    if(key === 'exit') return ''; // the exit IS the door on the wall — no sign plate
    const z = ZONES[key];
    const m = ROOM_MATS[key];
    const signY = m ? (z.y - m.h / 2) : z.y;
    return '<div class="zone" data-zone="' + key + '" style="left:' + z.x + '%;top:' + signY + '%">'
      + '<span class="zone-icon">' + z.icon + '</span>'
      + '<span class="zone-label">' + z.label + '</span>'
    + '</div>';
  }).join('');
  // Tally at his desk + the usage monitor mounted on the wall above him
  const staffHtml = '<div class="staff" style="left:53%;top:17.5%">'
    + '<div class="staff-face">' + TALLY_AVATAR.svg + '</div>'
    + '<div class="staff-name">Tally</div>'
    + '<div class="staff-bubble"></div>'
  + '</div>';
  const screenHtml =
    // live clock — current date + time, plus the weekly-reset countdown
    '<div class="wall-box wall-clock" style="left:20%;width:17%">'
      + '<div class="wc-date">— —</div>'
      + '<div class="wc-time">--:--:--</div>'
      + '<div class="wc-reset"></div>'
    + '</div>'
    // WEEKLY monitor: overall bar + fable bar
    + '<div class="wall-box ws-weekly" style="left:42%;width:20%">'
      + '<div class="ws-head"><span class="ws-title">WEEKLY</span><span class="ws-led ws-wled"></span></div>'
      + '<div class="ws-bar"><i class="ws-fill ws-wfill"></i></div>'
      + '<div class="ws-line ws-wline">syncing…</div>'
      + '<div class="ws-bar"><i class="ws-fill ws-ffill"></i></div>'
      + '<div class="ws-line ws-fline">FABLE —</div>'
    + '</div>'
    // 5-HOUR monitor (+ live session counter + all-time total)
    + '<div class="wall-box ws-main" style="left:63%;width:20%">'
      + '<div class="ws-head"><span class="ws-title">5-HOUR</span><span class="ws-led"></span></div>'
      + '<div class="ws-bar"><i class="ws-fill"></i></div>'
      + '<div class="ws-line ws-remain">syncing…</div>'
      + '<div class="ws-line ws-toks">⚡<span class="ws-stok">0</span> · Σ<span class="ws-alltime">—</span></div>'
    + '</div>';
  return '<div class="office-floor">'
    + '<div class="floor-camera"><div class="office-wall"></div>' + matsHtml + screenHtml + staffHtml + propsHtml + zonesHtml + '<div class="tokens-layer"></div></div>'
    + '<button class="floor-reset" type="button" title="Reset view">&#10021;</button>'
  + '</div>';
}

// Drag-to-pan + pinch/wheel-to-zoom on one office's floor. The camera's own
// box always equals the viewport (.office-floor) 1:1 at zoom 1 — zooming IN
// is what creates something to pan around, same model as a phone map app,
// rather than guessing a fixed "virtual canvas" size up front.
function initFloorCamera(floorEl){
  const camera = floorEl.querySelector('.floor-camera');
  const resetBtn = floorEl.querySelector('.floor-reset');
  let zoom = 1, panX = 0, panY = 0;
  const MIN_ZOOM = 0.7, MAX_ZOOM = 2.4;
  const pointers = new Map();
  let dragStart = null, pinchStart = null;

  function apply(){
    camera.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
  }
  function clampPan(){
    const vw = floorEl.clientWidth, vh = floorEl.clientHeight;
    const ew = vw * zoom, eh = vh * zoom;
    panX = Math.max(Math.min(0, vw - ew), Math.min(0, panX));
    panY = Math.max(Math.min(0, vh - eh), Math.min(0, panY));
  }
  function reset(){ zoom = 1; panX = 0; panY = 0; apply(); }

  floorEl.addEventListener('pointerdown', function(e){
    if(e.target.closest('.floor-reset')) return;
    // setPointerCapture can throw (e.g. "no active pointer with the given
    // id") in edge cases — uncaught, that would abort this whole handler
    // before pointers/dragStart ever get set up, silently breaking pan/zoom
    // entirely. A failed capture just means move/up might not fire if the
    // finger leaves the element; everything else below still needs to run.
    try{ floorEl.setPointerCapture(e.pointerId); }catch(err){ /* non-fatal */ }
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    floorEl.classList.add('panning');
    if(pointers.size === 1){
      dragStart = { x: e.clientX, y: e.clientY, panX: panX, panY: panY };
    } else if(pointers.size === 2){
      const pts = Array.from(pointers.values());
      pinchStart = { dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y), zoom: zoom };
      dragStart = null;
    }
  });
  floorEl.addEventListener('pointermove', function(e){
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if(pointers.size === 2 && pinchStart){
      const pts = Array.from(pointers.values());
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, pinchStart.zoom * (dist / Math.max(1, pinchStart.dist))));
      clampPan(); apply();
    } else if(pointers.size === 1 && dragStart){
      panX = dragStart.panX + (e.clientX - dragStart.x);
      panY = dragStart.panY + (e.clientY - dragStart.y);
      clampPan(); apply();
    }
  });
  function endPointer(e){
    pointers.delete(e.pointerId);
    if(pointers.size < 2) pinchStart = null;
    if(pointers.size === 1){
      const p = Array.from(pointers.values())[0];
      dragStart = { x: p.x, y: p.y, panX: panX, panY: panY };
    } else {
      dragStart = null;
      floorEl.classList.remove('panning');
    }
  }
  floorEl.addEventListener('pointerup', endPointer);
  floorEl.addEventListener('pointercancel', endPointer);
  floorEl.addEventListener('pointerleave', endPointer);

  floorEl.addEventListener('wheel', function(e){
    e.preventDefault();
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
    clampPan(); apply();
  }, { passive: false });

  if(resetBtn) resetBtn.addEventListener('click', function(e){ e.stopPropagation(); reset(); });

  return { reset: reset };
}

// Shown whenever no session is connected — an empty (but real) office instead
// of a blank box, so there's always something to look at.
function showPlaceholderOffice(){
  if(placeholderShown) return;
  floorEl.innerHTML = '<div class="office office-placeholder">'
    + '<div class="office-head"><span class="office-plaque">STANDBY<span class="cur">_</span></span><span class="office-cwd">— waiting for a session</span></div>'
    + officeSkeletonHtml()
  + '</div>';
  placeholderShown = true;
  applyUsageToScreens();
}
function hidePlaceholderOffice(){
  if(!placeholderShown) return;
  floorEl.innerHTML = '';
  placeholderShown = false;
}

function ensureOffice(sid, s){
  let o = officeEls.get(sid);
  if(!o){
    const root = document.createElement('div');
    root.className = 'office';
    root.innerHTML = '<div class="office-head"><span class="office-plaque"></span><span class="office-cwd"></span></div>' + officeSkeletonHtml();
    floorEl.appendChild(root);
    o = {
      root: root, tokensLayer: root.querySelector('.tokens-layer'), tokens: new Map(), leaving: false,
      zoneEls: {}, matEls: {}, camera: initFloorCamera(root.querySelector('.office-floor')),
    };
    Object.keys(ZONES).forEach(function(key){
      o.zoneEls[key] = root.querySelector('.zone[data-zone="' + key + '"]');
      o.matEls[key] = root.querySelector('.room-mat[data-mat="' + key + '"]');
    });
    officeEls.set(sid, o);
    applyUsageToScreens(); // freshly built wall monitor gets the last reading now, not at the next poll
  }
  o.root.querySelector('.office-plaque').textContent = displayName(s);
  o.root.querySelector('.office-cwd').textContent = '— ' + s.cwd;
  // live per-session token counter on the 5-HOUR monitor: climbs (animated)
  // as new usage lands, glows while the session is actively working
  const tokEl = o.root.querySelector('.ws-stok');
  if(tokEl){
    const target = s.sessionTokens || 0;
    if(o.tokShown == null) o.tokShown = 0;
    if(target !== o.tokShown){
      animateCount(function(v){ tokEl.textContent = fmtTok(v); }, o.tokShown, target, 650);
      o.tokShown = target;
    }
  }
  const working = s.status === 'active' || s.status === 'thinking' || s.status === 'calm' || s.status === 'error';
  o.root.classList.toggle('working', working);
  return o;
}

const _tokFaceInner = '<span class="token-led"></span><span class="hand hand-l"></span><span class="hand hand-r"></span>';
function ensureToken(o, tokenKey, avatar, isMain){
  let t = o.tokens.get(tokenKey);
  if(!t){
    const wrap = document.createElement('div');
    wrap.className = 'agent-token' + (isMain ? ' token-main' : '');
    wrap.innerHTML = '<div class="token-badge">'
      + '<div class="token-bubble"><span class="tb-text"></span></div>'
      + '<div class="token-badge-face">' + _tokFaceInner + avatar.svg + '</div>'
      + '<div class="token-legs"><span class="leg leg-l"></span><span class="leg leg-r"></span></div>'
      + '<div class="token-shadow"></div>'
      + '<div class="token-name"></div>'
    + '</div>';
    o.tokensLayer.appendChild(wrap);
    t = {
      wrap: wrap, bubbleEl: wrap.querySelector('.token-bubble'), shadowEl: wrap.querySelector('.token-shadow'),
      bubbleTextEl: wrap.querySelector('.token-bubble .tb-text'),
      nameEl: wrap.querySelector('.token-name'),
      faceEl: wrap.querySelector('.token-badge-face'), avatarId: avatar.id,
      lastZone: null, lastBubble: null, lastName: null, walkTimer: null, gen: 0,
    };
    o.tokens.set(tokenKey, t);
  } else if(avatar && t.avatarId !== avatar.id){
    // The avatar changed on a persistent token — a /model switch re-skins the
    // boss's fixed face. Swap just the SVG in place (the LED/hands spans are
    // stateless, rebuilt with it); position/bubble/name are untouched so the
    // walk animation keeps running.
    t.faceEl.innerHTML = _tokFaceInner + avatar.svg;
    t.avatarId = avatar.id;
  }
  return t;
}

function updateToken(t, pos, zoneKey, status, bubbleText, name, tier){
  t.wrap.style.left = pos.x + '%';
  t.wrap.style.top = pos.y + '%';
  t.wrap.setAttribute('data-status', status);
  t.wrap.style.setProperty('--st', STATUS_COLOR[status] || STATUS_COLOR.idle);
  t.wrap.style.setProperty('--tier', tier || 0);
  t.gen++; // invalidates any pending lounge-banter revert (see sayBanter)

  if(zoneKey !== t.lastZone){
    t.wrap.classList.add('is-walking');
    if(t.walkTimer) clearTimeout(t.walkTimer);
    // Matches the .agent-token left/top transition (1.7s) so the legs keep
    // striding until arrival, then the shadow does its little landing pulse.
    t.walkTimer = setTimeout(function(){
      t.wrap.classList.remove('is-walking');
      t.shadowEl.classList.remove('arrive');
      void t.shadowEl.offsetWidth;
      t.shadowEl.classList.add('arrive');
    }, 1750);
    t.lastZone = zoneKey;
  }
  // No text = no bubble. Idle entities (crew on the bench, a settled
  // subagent, the boss with nothing fresh to say) just stand there.
  bubbleText = bubbleText || null;
  if(bubbleText !== t.lastBubble){
    if(bubbleText){
      t.bubbleTextEl.textContent = bubbleText;
      t.bubbleEl.classList.add('show');
      t.bubbleEl.classList.remove('pulse');
      void t.bubbleEl.offsetWidth;
      t.bubbleEl.classList.add('pulse');
    } else {
      t.bubbleEl.classList.remove('show');
    }
    t.lastBubble = bubbleText;
  }
  if(name !== t.lastName){
    t.nameEl.textContent = name;
    t.lastName = name;
  }
}

function updateZoneOccupancy(o){
  const occ = {};
  o.tokens.forEach(function(t){
    if(!t.lastZone) return;
    // prefer an "active" occupant's color if the zone has more than one
    if(!occ[t.lastZone] || t.wrap.getAttribute('data-status') === 'active'){
      occ[t.lastZone] = STATUS_COLOR[t.wrap.getAttribute('data-status')] || STATUS_COLOR.idle;
    }
  });
  Object.keys(o.zoneEls).forEach(function(key){
    const el = o.zoneEls[key];
    const mat = o.matEls[key];
    if(el){
      if(occ[key]){
        el.classList.add('zone-active');
        el.style.setProperty('--zc', occ[key]);
      } else {
        el.classList.remove('zone-active');
      }
    }
    // the room's flooring glows along with its sign while occupied
    if(mat){
      if(occ[key]){
        mat.classList.add('mat-active');
        mat.style.setProperty('--zc', occ[key]);
      } else {
        mat.classList.remove('mat-active');
      }
    }
  });
}

/* ---- bubble collision resolver ----
   Bubbles now show full speech (up to a 6-line clamp), so their heights vary
   too much for fixed tier offsets to guarantee separation. After each render
   (and again once the .9s walk transitions have settled), measure every
   visible bubble's real box and lift any that would overlap an already-placed
   neighbour, left to right — the lift lands in the --lift CSS var that
   .token-bubble's margin-bottom includes. Screen-space measurements are
   divided by the floor camera's current zoom before being applied. */
function resolveBubbleLayout(o){
  const shown = [];
  o.tokens.forEach(function(t){
    if(!t.bubbleEl.classList.contains('show')) return;
    if(t.curLift){ t.bubbleEl.style.setProperty('--lift', '0px'); t.curLift = 0; }
    shown.push(t);
  });
  if(!shown.length) return;
  const floorRect = o.root.querySelector('.office-floor').getBoundingClientRect();
  const cam = o.root.querySelector('.floor-camera');
  const scale = (cam.getBoundingClientRect().width / cam.offsetWidth) || 1;

  // Pass 1 — flip. A speaker near the top of the floor (Planning, the Exit
  // door) can't fit a tall bubble above its head: the floor's
  // overflow:hidden cuts the first lines clean off. Measure each bubble at
  // its natural above-the-head spot; whoever pokes past the floor top gets
  // .below and hangs under the avatar instead, arrow flipped.
  shown.forEach(function(t){ t.bubbleEl.classList.remove('below'); });
  shown.forEach(function(t){
    const r = t.bubbleEl.getBoundingClientRect();
    if(r.top < floorRect.top + 2) t.bubbleEl.classList.add('below');
  });
  if(shown.length < 2) return;

  // Pass 2 — collisions. Re-measure (flips moved things), then shift
  // overlapping bubbles apart left-to-right: above-bubbles move UP, capped
  // at the floor top; below-bubbles move DOWN, capped at the floor bottom.
  // A capped shift can leave a partial overlap in the extreme, but two
  // half-visible bubbles beat one whose opening sentence is missing.
  const items = shown.map(function(t){
    const r = t.bubbleEl.getBoundingClientRect();
    return { t: t, below: t.bubbleEl.classList.contains('below'), x: r.left, right: r.right, top: r.top, bottom: r.bottom };
  }).filter(function(it){ return it.right - it.x > 2; });
  items.sort(function(a, b){ return a.x - b.x || a.top - b.top; });
  const placed = [];
  items.forEach(function(it){
    const dir = it.below ? 1 : -1; // which way this bubble may be pushed
    let shift = 0, guard = 0, collided = true;
    while(collided && guard++ < 20){
      collided = false;
      for(let i = 0; i < placed.length; i++){
        const p = placed[i];
        const top = it.top + dir * shift, bottom = it.bottom + dir * shift;
        const ox = Math.min(it.right, p.right) - Math.max(it.x, p.x);
        const oy = Math.min(bottom, p.bottom) - Math.max(top, p.top);
        if(ox > 2 && oy > -4){ shift += oy + 6; collided = true; }
      }
    }
    const cap = it.below ? (floorRect.bottom - it.bottom - 2) : (it.top - floorRect.top - 2);
    shift = Math.max(0, Math.min(shift, cap));
    if(shift > 0){
      it.t.bubbleEl.style.setProperty('--lift', Math.round(shift / scale) + 'px');
      it.t.curLift = shift;
    }
    placed.push({ x: it.x, right: it.right, top: it.top + dir * shift, bottom: it.bottom + dir * shift });
  });
}
let _blRaf = null, _blSettle = null;
function scheduleBubbleLayout(){
  if(!_blRaf){
    _blRaf = requestAnimationFrame(function(){
      _blRaf = null;
      officeEls.forEach(resolveBubbleLayout);
    });
  }
  // Token left/top transitions run .9s, and the bubble "pulse" pop runs
  // .25s — a second pass after both have settled measures true positions.
  clearTimeout(_blSettle);
  _blSettle = setTimeout(function(){ officeEls.forEach(resolveBubbleLayout); }, 1000);
}

function render(){
  if(sessions.size === 0 && officeEls.size === 0){
    showPlaceholderOffice();
    return;
  }
  hidePlaceholderOffice();

  officeEls.forEach(function(o, sid){
    if(!sessions.has(sid) && !o.leaving){
      o.leaving = true;
      o.root.style.transition = 'opacity .4s, transform .4s';
      o.root.style.opacity = '0';
      o.root.style.transform = 'scale(.95)';
      setTimeout(function(){ o.root.remove(); officeEls.delete(sid); render(); }, 420);
    }
  });

  sessions.forEach(function(s, sid){
    const o = ensureOffice(sid, s);

    // Collect every entity that needs a token this render, THEN group by
    // target zone — occupants of the same zone need to know about each
    // other to get evenly spread slots instead of overlapping.
    // The boss is skipped entirely once "gone" (left on holiday/home, last
    // one out); while leaving, it walks to the exit with a farewell.
    const entities = [];
    const seen = {};
    if(!s.bossGone){
      entities.push({ key:'__main__',
        zone: s.bossLeaving ? s.bossLeaving.zone : s.zone,
        status: s.bossLeaving ? 'offline' : s.status,
        bubble: s.bossLeaving ? s.bossLeaving.bubble : s.bubble,
        avatar:s.avatar, name:displayName(s), isMain:true });
      seen['__main__'] = true;
    }
    if(s.courier){
      seen['__courier__'] = true;
      entities.push({ key:'__courier__', zone:s.courier.zone, status:s.courier.status, bubble:s.courier.bubble, avatar:COURIER_AVATAR, name:'Dispatch', isMain:false });
    }
    if(s.departing){
      // the previous model's persona (grayscale) saying goodbye on its way out
      seen['__depart__'] = true;
      entities.push({ key:'__depart__', zone:s.departing.zone, status:s.departing.status, bubble:s.departing.bubble, avatar:(s.departing.avatar || s.avatar), name:s.departing.name, isMain:false });
    }
    const onDuty = {};
    s.subagents.forEach(function(a, aid){
      seen[aid] = true;
      onDuty[a.codenameBase] = true;
      entities.push({ key:aid, zone:a.zone, status:a.status, bubble:a.bubble, avatar:a.avatar, name:displayName(a), isMain:false });
    });
    // The crew stays put — except whoever is currently on duty: the working
    // subagent IS that crew member (same codename, same sprite), so its
    // bench copy is hidden rather than the whole lounge emptying out.
    if(s.status !== 'offline'){
      REGULAR_CREW.forEach(function(crew){
        const cn = codenameForAgentType(crew.agentType);
        if(onDuty[cn]) return;
        if(s.crewGone && s.crewGone.indexOf(cn) !== -1) return; // already clocked out / on holiday
        const leaving = s.crewLeaver && s.crewLeaver.codename === cn;
        seen[crew.key] = true;
        entities.push({ key:crew.key, zone: leaving ? s.crewLeaver.zone : 'lounge', status:'idle',
          bubble: leaving ? s.crewLeaver.bubble : null,
          avatar:avatarForAgentType(crew.agentType), name:cn, isMain:false, isCrew:true });
      });
    }

    const byZone = {};
    entities.forEach(function(e){ (byZone[e.zone] = byZone[e.zone] || []).push(e); });

    entities.forEach(function(e){
      const group = byZone[e.zone];
      const idx = group.indexOf(e);
      const pos = zoneToPos(e.zone, idx, group.length);
      const t = ensureToken(o, e.key, e.avatar, e.isMain);
      if(e.isCrew) t.wrap.classList.add('token-crew');
      updateToken(t, pos, e.zone, e.status, e.bubble, e.name, idx % 2);
    });

    o.tokens.forEach(function(t, tid){
      if(!seen[tid]){
        t.wrap.style.transition = 'opacity .35s, transform .35s';
        t.wrap.style.opacity = '0';
        t.wrap.style.transform = 'translate(-50%,-50%) scale(.6)';
        const doomed = t.wrap;
        setTimeout(function(){ doomed.remove(); }, 360);
        o.tokens.delete(tid);
      }
    });

    updateZoneOccupancy(o);
  });
  scheduleBubbleLayout();
}

   it never calls any model or API, so there's no token cost to gate on and no
   duration is "real" (it plays ambiently for as long as people are idling,
   not a fixed script that ends). It only ever targets entities that are
   genuinely idle at the lounge, and never overwrites a real status bubble:

function sayStaffLine(o, text){
  const el = o.root.querySelector('.staff-bubble');
  if(!el) return;
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 4500);
  chatLog('Tally', text, 'banter');
}
function sayBanter(t, text){
  const myGen = t.gen;
  t.banterSeq = (t.banterSeq || 0) + 1;
  const mySeq = t.banterSeq;
  t.bubbleTextEl.textContent = text;
  t.bubbleEl.classList.add('show');
  t.bubbleEl.classList.remove('pulse');
  void t.bubbleEl.offsetWidth;
  t.bubbleEl.classList.add('pulse');
  chatLog(t.lastName || 'crew', text, 'banter');
  scheduleBubbleLayout();
  setTimeout(function(){
    // Only revert if this is still both the token's latest REAL state (gen)
    // and its latest banter line (banterSeq) — otherwise a 3-line exchange
    // where the same token speaks twice would have line 1's own revert-timer
    // stomp line 3 a moment after it was said. If the token had no real
    // bubble to go back to (idle crew, settled subagent), the banter bubble
    // simply fades away — said, then done, like actual speech.
    if(t.gen === myGen && t.banterSeq === mySeq){
      if(t.lastBubble){
        t.bubbleTextEl.textContent = t.lastBubble;
        t.bubbleEl.classList.remove('pulse');
        void t.bubbleEl.offsetWidth;
        t.bubbleEl.classList.add('pulse');
      } else {
        t.bubbleEl.classList.remove('show');
      }
      scheduleBubbleLayout();
    }
  }, 4500);
}
