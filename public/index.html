// Staged departure: while a limit is spent, empty the office ONE at a time —
// crew first (in order), then Tally, then the boss LAST. Each says a
// farewell, walks to the exit door, and vanishes. Slow on purpose (only one
// leaves at a time), so the office drains gradually.
function stepDeparture(o, s, mode, cast){
  if(s.leaving) return; // someone's mid-exit — wait for them to clear the door
  const gone = s.crewGone || (s.crewGone = []);

  // 1) crew, in order
  const cn = CREW_ORDER.find(function(n){ return gone.indexOf(n) === -1 && cast[n]; });
  if(cn){
    s.leaving = true;
    const bye = pick((CREW_BYE[mode] && CREW_BYE[mode][cn]) || ['Heading out.']);
    s.crewLeaver = { codename: cn, zone: 'lounge', bubble: bye };
    chatLog(cn, bye, mode === 'holiday' ? 'handback' : 'status');
    render();
    s.departTimers.push(setTimeout(function(){ if(s.crewLeaver && s.crewLeaver.codename === cn){ s.crewLeaver.zone = 'exit'; render(); } }, 2200));
    s.departTimers.push(setTimeout(function(){ if(s.crewLeaver && s.crewLeaver.codename === cn){ gone.push(cn); s.crewLeaver = null; s.leaving = false; render(); } }, 4400));
    return;
  }

  // 2) Tally closes the books and heads out (he's a static .staff element,
  //    so we animate his div to the door and hide it)
  if(!s.tallyGone){
    s.leaving = true;
    sayStaffLine(o, pick(TALLY_BYE[mode] || ['Books closed. Bye.']));
    const staff = o.root.querySelector('.staff');
    s.departTimers.push(setTimeout(function(){ if(staff){ staff.style.transition = 'left 1.2s ease, top 1.2s ease, opacity .6s'; staff.style.left = '84%'; staff.style.top = '9%'; } }, 2200));
    s.departTimers.push(setTimeout(function(){ if(staff) staff.style.opacity = '0'; }, 3600));
    s.departTimers.push(setTimeout(function(){ s.tallyGone = true; s.leaving = false; if(staff) staff.style.display = 'none'; render(); }, 4700));
    return;
  }

  // 3) the boss, LAST — walks out and the office is finally empty
  if(!s.bossGone && cast.boss){
    s.leaving = true;
    const bye = pick(BOSS_BYE[mode] || ['Last one out. Bye.']);
    s.bossLeaving = { zone: 'lounge', bubble: bye };
    chatLog(displayName(s), bye, 'delegate');
    render();
    s.departTimers.push(setTimeout(function(){ if(s.bossLeaving){ s.bossLeaving.zone = 'exit'; render(); } }, 2200));
    s.departTimers.push(setTimeout(function(){
      if(s.bossLeaving){
        s.bossGone = true; s.bossLeaving = null; s.leaving = false;
        logMoment((mode === 'holiday' ? '🏖 ' : '🏠 ') + 'Whole office ' + (mode === 'holiday' ? 'on holiday' : 'clocked out') + ' — everyone left');
        render();
      }
    }, 4600));
    return;
  }
}
// Reopen the office when work resumes / the limit lifts: crew, Tally and the
// boss all come back, Tally's desk is restored.
function reopenOffice(sid){
  const s = sessions.get(sid);
  if(!s) return;
  if(!(s.crewGone && s.crewGone.length) && !s.tallyGone && !s.bossGone && !s.leaving && !s.crewLeaver && !s.bossLeaving) return;
  s.crewGone = []; s.crewLeaver = null; s.tallyGone = false; s.bossGone = false; s.bossLeaving = null; s.leaving = false;
  clearDepartTimers(s);
  const o = officeEls.get(sid);
  if(o){
    const staff = o.root.querySelector('.staff');
    if(staff){ staff.style.display = ''; staff.style.opacity = ''; staff.style.transition = ''; staff.style.left = '53%'; staff.style.top = '17.5%'; }
  }
  render();
}

// Play an exchange against the current cast: 'tally' always lands (he's at
// his desk), any other absent speaker's line simply drops out.
function playCastExchange(o, exchange, cast){
  exchange.forEach(function(line, i){
    setTimeout(function(){
      if(line.who === 'tally') sayStaffLine(o, line.text);
      else if(cast[line.who]) sayBanter(cast[line.who], line.text);
    }, i * 2400);
  });
}

  ],
  Boss: [
    [{who:'Scout',text:"New face in the chair — {inc}."},{who:'Jack',text:"Long as it delegates, I'm happy."}],
    [{who:'Blueprint',text:"{inc} takes over. Unclassified in my org chart, but welcome."},{who:'Ace',text:"Mystery boss. Exciting."}],
  ],
};
// Layered on sometimes when the RANK actually changed between shifts.
const SHIFT_DIR_UP = [   // a more senior model took the chair
  [{who:'Scout',text:"Promotion energy — {out} out, {inc} in. We're moving UP."},{who:'Jack',text:"Up in the world. Same couch, though."}],
  [{who:'Ace',text:"Reinforcements. {inc} outranks the last shift."},{who:'Blueprint',text:"Escalation, properly documented."}],
  [{who:'Jack',text:"{out} handed the chair UP to {inc}. Big leagues."},{who:'Scout',text:"Do we get bigger token budgets?"},{who:'Jack',text:"No."}],
];
const SHIFT_DIR_DOWN = [ // a more junior model took the chair
  [{who:'Jack',text:"{out} clocks out, {inc} steps down to cover. Running lean."},{who:'Scout',text:"Budget shift. I can feel it in the tokens."}],
  [{who:'Blueprint',text:"Downshift: {inc} for {out}. Adjusting the risk model."},{who:'Ace',text:"Same work, smaller hat."}],
  [{who:'Ace',text:"Traded down from {out} to {inc}. No offence, {inc}."},{who:'Scout',text:"Some offence."}],
];

// The crew present and idle in the lounge — the boss (__main__) is excluded on
// purpose: they're the one mid-handover, so the CREW does the commentary.
function _loungeCast(o){
  const cast = {};
  o.tokens.forEach(function(t, tid){
    if(tid === '__main__') return;
    if(t.lastZone !== 'lounge' || t.wrap.getAttribute('data-status') !== 'idle') return;
    const n = t.lastName;
    if(n === 'Scout' || n === 'Jack' || n === 'Blueprint' || n === 'Ace') cast[n] = t;
  });
  return cast;
}
function playShiftBanter(sid, incModel, outModel){
  const o = officeEls.get(sid);
  if(!o) return;
  const cast = _loungeCast(o);
  if(!Object.keys(cast).length) return; // nobody idle in the lounge to comment
  const inc = modelRank(incModel), out = modelRank(outModel);
  const incNick = inc.nick || 'the new boss', outNick = out.nick || 'the old boss';
  // usually tier-based; when the rank actually moved, sometimes a
  // direction-flavoured line (promotion up vs stepping down) instead
  let pool = SHIFT_BANTER[inc.title] || SHIFT_BANTER.Boss;
  if(inc.rank !== out.rank && Math.random() < 0.5) pool = inc.rank > out.rank ? SHIFT_DIR_UP : SHIFT_DIR_DOWN;
  // keep only exchanges every named speaker of which is actually present
  const ok = pool.filter(function(ex){ return ex.every(function(l){ return l.who === 'tally' || cast[l.who]; }); });
  const chosen = ok.length ? pick(ok) : pick(pool);
  const ex = chosen.map(function(l){
    return { who: l.who, text: l.text.replace(/\{inc\}/g, incNick).replace(/\{out\}/g, outNick).replace(/\{title\}/g, inc.title) };
  });
  playCastExchange(o, ex, cast);
}

function runChatTick(){
  officeEls.forEach(function(o, sid){
    // cast of available speakers first — every branch below uses it
    const cast = {};
    let visitor = null;
    o.tokens.forEach(function(t, tid){
      if(t.lastZone !== 'lounge' || t.wrap.getAttribute('data-status') !== 'idle') return;
      if(tid === '__main__'){ cast.boss = t; return; }
      const n = t.lastName;
      if(n === 'Scout' || n === 'Jack' || n === 'Blueprint' || n === 'Ace') cast[n] = t;
      else visitor = t;
    });
    const present = Object.keys(cast);

    // usage & limit callouts — 5h spent → clock-out theatre, weekly/fable
    // spent → holiday theatre, otherwise Tally's regular meter commentary
    const s = sessions.get(sid);
    if(_usageData && _usageData.block){
      const pct = _usageData.block.usedPct || 0;
      const wk = _usageData.weekly || {};
      // Only clock the office out on a REAL limit signal. block.usedPct and the
      // non-anchored weekly are auto-calibrated "vs your own busiest block/week"
      // gauges — they hit 100% just by being the heaviest on record, which is
      // NOT a real quota (local code can't see actual plan limits). Firing the
      // "hit my limit, going home" theatre off that clocked everyone out on a
      // normal heavy day at ~48% real usage. So: holiday only when the weekly
      // is ANCHORED to the user's real account % and maxed, and the 5-hour
      // "home" only when an actual rate-limit warning was seen in a transcript.
      const anchored = wk.source === 'anchored';
      const warn = !!_usageData.warning;
      const weeklyOut = anchored && ((wk.usedPct || 0) >= 100 || (wk.fable && (wk.fable.usedPct || 0) >= 100));
      const blockOut = warn;
      const limitMode = weeklyOut ? 'holiday' : blockOut ? 'home' : null;
      if(limitMode){
        // the office is closing: send the crew home ONE AT A TIME (slow,
        // each with a farewell), and occasionally play a group limit line
        if(s) stepDeparture(o, s, limitMode, cast);
        if(Math.random() < 0.16){
          const pool = weeklyOut ? LIMIT_HOLIDAY_EXCHANGES : LIMIT_HOME_EXCHANGES;
          const reset = _usageData.block.resetInMs != null ? fmtDur(_usageData.block.resetInMs) : 'soon';
          const resetd = wk.resetDays ? '~' + wk.resetDays + ' day' + (wk.resetDays > 1 ? 's' : '') : 'a few days';
          const ex = pick(pool).map(function(line){
            return { who: line.who, text: line.text.replace('{reset}', reset).replace('{resetd}', resetd) };
          });
          playCastExchange(o, ex, cast);
        }
        return;
      }
      // limit lifted (window/week reset) — the whole office drifts back in
      if(s) reopenOffice(sid);
      if(Math.random() < 0.06){
        const pool = pct >= 75 ? TALLY_USAGE_HIGH : pct >= 40 ? TALLY_USAGE_MID : TALLY_USAGE_LOW;
        const reset = _usageData.block.resetInMs != null ? fmtDur(_usageData.block.resetInMs) : 'soon';
        const ex = pick(pool).map(function(line){
          return { who: line.who, text: line.text.replace('{pct}', pct).replace('{reset}', reset) };
        });
        playCastExchange(o, ex, cast);
        return;
      }
    }

    if(present.length === 0){
      if(visitor && Math.random() < 0.15){ sayBanter(visitor, pick(CHARACTER_SOLO.visitor)); return; }
      if(Math.random() < 0.04) sayStaffLine(o, pick(TALLY_SOLO));
      return;
    }

    // occasionally someone just muses to themselves, in their own voice
    if(present.length === 1 || Math.random() < 0.12){
      if(Math.random() < 0.3){
        const k = pick(present);
        sayBanter(cast[k], pick(CHARACTER_SOLO[k]));
      }
      return;
    }

    if(Math.random() < 0.6){
      // exchanges whose EVERY named speaker is present, minus the recently
      // played ones (per-office shuffle-bag, half the pool deep — the same
      // dialogue can't repeat until the material has cycled)
      if(!o.banterHist) o.banterHist = [];
      const eligible = [];
      CREW_EXCHANGES.forEach(function(ex, i){
        if(o.banterHist.indexOf(i) !== -1) return;
        for(let li = 0; li < ex.length; li++){
          const w = ex[li].who;
          if(w !== 'tally' && !cast[w]) return;
        }
        eligible.push(i);
      });
      if(!eligible.length){ o.banterHist = []; return; } // bag cycled — refills next tick
      const idx = pick(eligible);
      o.banterHist.push(idx);
      if(o.banterHist.length > Math.floor(CREW_EXCHANGES.length / 2)) o.banterHist.shift();
      playCastExchange(o, CREW_EXCHANGES[idx], cast);
    }
  });
}
function scheduleChat(){
  setTimeout(function(){ runChatTick(); scheduleChat(); }, 7000 + Math.random() * 6000);
}

/* ============ WALL USAGE MONITOR ============
   GET /api/usage (aggregated from this machine's transcripts) feeds the
   monitor mounted on every office's back wall, above Tally's desk:
   - bar + "% left": current 5h block vs the week's heaviest block (real
     plan quotas aren't exposed locally, so the heaviest block IS the
     honest 100% mark — see README)
   - "resets in X": real countdown to the current 5h block's end
   - tiny lines: block/7d totals and the newest model + effort
   - red LED + warning row if a limit warning ever lands in a transcript */
let _usageData = null;
function fmtTok(n){
  n = n || 0;
  if(n >= 1e9) return (n / 1e9).toFixed(n < 1e10 ? 1 : 0) + 'B';
  if(n >= 1e6) return (n / 1e6).toFixed(n < 1e7 ? 1 : 0) + 'M';
  if(n >= 1e3) return (n / 1e3).toFixed(n < 1e4 ? 1 : 0) + 'k';
  return String(n);
}
function modelShort(m){ return String(m || '?').replace(/^claude-/, '').replace(/-\d{8}$/, ''); }
// smoothly animate a big number climbing from → to (real-time counter feel),
// calling apply(v) each frame; these are millions so we interpolate rather
// than +1-tick
function animateCount(apply, from, to, dur){
  from = from || 0;
  if(from === to){ apply(to); return; }
  const start = performance.now();
  requestAnimationFrame(function step(now){
    const p = Math.min(1, (now - start) / dur);
    apply(Math.round(from + (to - from) * p));
    if(p < 1) requestAnimationFrame(step);
  });
}
function fmtDur(ms){
  const m = Math.max(0, Math.round(ms / 60000));
  return m >= 60 ? Math.floor(m / 60) + 'h ' + (m % 60) + 'm' : m + 'm';
}
// day+hour countdown for the weekly reset (e.g. "2d 3h" / "5h")
function fmtDaysHours(ms){
  const h = Math.max(0, Math.round(ms / 3600000));
  return h >= 24 ? Math.floor(h / 24) + 'd ' + (h % 24) + 'h' : h + 'h';
}
function applyUsageToScreens(){
  const u = _usageData;
  if(!u) return;
  const b = u.block || {};
  const usedPct = b.usedPct || 0;
  const leftPct = Math.max(0, 100 - usedPct);
  function fillCls(p){ return 'ws-fill' + (p >= 85 ? ' hot' : p >= 60 ? ' mid' : ''); }
  // absolute reset targets so the 1s clock ticker can count down smoothly
  // between the 60s server polls (see updateClock)
  _blockResetAt = b.resetInMs != null ? Date.now() + b.resetInMs : null;
  document.querySelectorAll('.wall-box.ws-main').forEach(function(ws){
    const fill = ws.querySelector('.ws-fill');
    fill.style.width = usedPct + '%';
    fill.className = fillCls(usedPct);
    // short line: "64% left" + live reset span the ticker fills
    ws.querySelector('.ws-remain').innerHTML = b.resetInMs != null
      ? '<b>' + leftPct + '% left</b> · <span class="ws-mreset"></span>'
      : '<b>fresh window</b>';
    // all-time total (Σ) beside the live session counter (⚡)
    const at = ws.querySelector('.ws-alltime');
    if(at) at.textContent = fmtTok(u.allTimeTotal || 0);
    ws.querySelector('.ws-led').className = 'ws-led' + (u.warning ? ' warn' : '');
  });
  // the second monitor: rolling 7-day total + fable-specific 7-day. Until
  // enough history exists to know a "busiest prior week" baseline, usedPct
  // is null — we show the raw totals and "building baseline…" rather than a
  // false "0% left" full-red bar (the meter is vs your own history, NOT an
  // Anthropic plan quota, which isn't exposed locally).
  const wk = u.weekly || {};
  const f = wk.fable || {};
  const cal = !!wk.calibrated && wk.usedPct != null;
  // reset target for the weekly countdown shown on the clock box
  _weeklyResetAt = (wk.resetMs != null) ? Date.now() + wk.resetMs : null;
  document.querySelectorAll('.wall-box.ws-weekly').forEach(function(ws){
    const wf = ws.querySelector('.ws-wfill');
    const ff = ws.querySelector('.ws-ffill');
    if(cal){
      const wUsed = wk.usedPct || 0;
      const fUsed = f.usedPct != null ? f.usedPct : 0;
      // ⚓ removed — the relevant token counts sit here now: weekly total on
      // the weekly line, fable total on the fable line
      wf.style.width = wUsed + '%';
      wf.className = fillCls(wUsed) + ' ws-wfill';
      ws.querySelector('.ws-wline').innerHTML = '<b>' + Math.max(0, 100 - wUsed) + '% left</b> · ' + fmtTok(wk.total);
      ff.style.width = fUsed + '%';
      ff.className = fillCls(fUsed) + ' ws-ffill';
      ws.querySelector('.ws-fline').innerHTML = 'FABLE <b>' + Math.max(0, 100 - fUsed) + '%</b> · ' + fmtTok(f.total);
      ws.querySelector('.ws-wled').className = 'ws-led ws-wled' + ((wUsed >= 100 || fUsed >= 100) ? ' warn' : '');
    } else {
      // learning phase: no baseline yet — show total, a calm low bar, no % left
      const d = (wk.daysRecorded || 0);
      wf.style.width = '8%'; wf.className = 'ws-fill ws-wfill';
      ws.querySelector('.ws-wline').innerHTML = '<b>7d ' + fmtTok(wk.total) + '</b> · ' + d + 'd';
      ff.style.width = '8%'; ff.className = 'ws-fill ws-ffill';
      ws.querySelector('.ws-fline').innerHTML = 'FABLE <b>' + fmtTok(f.total) + '</b>';
      ws.querySelector('.ws-wled').className = 'ws-led ws-wled';
    }
  });
}

// ---- live wall clock + reset countdowns (1s ticker) ----
// Current date + time in every office, plus the weekly-reset countdown on
// the clock box and the 5h-reset countdown on its monitor. Targets are
// absolute timestamps (set at each server poll) so the countdown ticks
// smoothly every second between the 60s polls.
let _weeklyResetAt = null, _blockResetAt = null;
const _DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const _MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function _two(n){ return String(n).padStart(2, '0'); }
// precise live countdown as a ticking clock (HH:MM:SS), with a day prefix
// only when needed — a real time countdown, not a "N days left" estimate
function _fmtCountdown(ms){
  if(ms == null || ms <= 0) return 'now';
  let s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400); s %= 86400;
  const h = Math.floor(s / 3600); s %= 3600;
  const m = Math.floor(s / 60); s %= 60;
  return (d > 0 ? d + 'd ' : '') + _two(h) + ':' + _two(m) + ':' + _two(s);
}
function updateClock(){
  const now = new Date();
  const date = _DOW[now.getDay()] + ' ' + now.getDate() + ' ' + _MON[now.getMonth()];
  const time = _two(now.getHours()) + ':' + _two(now.getMinutes()) + ':' + _two(now.getSeconds());
  const wkReset = _weeklyResetAt != null ? _fmtCountdown(_weeklyResetAt - Date.now()) : '';
  const blkReset = _blockResetAt != null ? _fmtCountdown(_blockResetAt - Date.now()) : '';
  document.querySelectorAll('.wall-clock').forEach(function(wc){
    wc.querySelector('.wc-date').textContent = date;
    wc.querySelector('.wc-time').textContent = time;
    wc.querySelector('.wc-reset').textContent = wkReset ? '↻ ' + wkReset : '';
  });
  document.querySelectorAll('.ws-mreset').forEach(function(el){ el.textContent = blkReset; });
}
setInterval(updateClock, 1000);
updateClock();
let _prevBlockOut = null, _prevWeeklyOut = null;
function refreshUsagePanel(){
  fetch('/api/usage').then(function(r){ return r.json(); }).then(function(u){
    if(!u || u.error || !u.block) return;
    _usageData = u;
    applyUsageToScreens();
    // log the MOMENT a REAL limit is first reached (transition, not every
    // poll) — same real-signal gating as the departure theatre (see
    // runChatTick): an actual rate-limit warning for the 5-hour, the
    // ANCHORED weekly maxed for the holiday. NOT the auto-calibrated gauge.
    const wk = u.weekly || {};
    const blockOut = !!u.warning;
    if(_prevBlockOut === false && blockOut) logMoment('🏠 Rate limit hit — the team clocked out for now');
    _prevBlockOut = blockOut;
    const weeklyOut = wk.source === 'anchored' && ((wk.usedPct || 0) >= 100 || (wk.fable && (wk.fable.usedPct || 0) >= 100));
    if(_prevWeeklyOut === false && weeklyOut) logMoment('🏖 Weekly limit reached — office on holiday until reset');
    _prevWeeklyOut = weeklyOut;
  }).catch(function(){ /* server old or busy — screens keep last reading */ });
}
refreshUsagePanel();
setInterval(refreshUsagePanel, 60000);

function connect(){
  const es = new EventSource('/events');
  es.onopen = function(){ connDot.classList.add('on'); connText.textContent = 'live'; };
  es.onerror = function(){ connDot.classList.remove('on'); connText.textContent = 'reconnecting…'; };
  es.onmessage = function(e){
    try{ handleEvent(JSON.parse(e.data)); }catch(err){ /* ignore malformed */ }
  };
}
connect();
render();
scheduleChat();

// PWA: register the (cache-free) service worker only on secure origins —
// plain http://<tailscale-ip> would just log errors. With HTTPS (e.g. via
// `tailscale serve`), Chrome's "Add to Home screen" installs a real
// standalone app; on http it still creates a working shortcut icon.
if ('serviceWorker' in navigator && window.isSecureContext) {
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
</script>
